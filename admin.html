<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Админ — КАЗУИТС</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f6f9; min-height: 100vh; }

  /* LOGIN */
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; background: linear-gradient(135deg, #00843d 0%, #006830 100%);
  }
  .login-box {
    background: #fff; border-radius: 16px; padding: 48px 40px;
    width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    text-align: center;
  }
  .login-box .logo { font-size: 42px; margin-bottom: 8px; }
  .login-box h2 { color: #00843d; font-size: 22px; margin-bottom: 4px; }
  .login-box p { color: #888; font-size: 13px; margin-bottom: 28px; }
  .login-box input {
    width: 100%; padding: 12px 16px; border: 1.5px solid #ddd;
    border-radius: 8px; font-size: 15px; outline: none; margin-bottom: 12px;
    transition: border-color .2s;
  }
  .login-box input:focus { border-color: #00ba37; }
  .login-box button {
    width: 100%; padding: 13px; background: #00ba37; color: #fff;
    border: none; border-radius: 8px; font-size: 16px; font-weight: 600;
    cursor: pointer; transition: background .2s;
  }
  .login-box button:hover { background: #00a332; }
  .login-error { color: #dc3545; font-size: 13px; margin-top: 8px; display: none; }

  /* ADMIN PANEL */
  #admin-panel { display: none; }

  header {
    background: #fff; border-bottom: 1px solid #e5e7eb;
    padding: 0 32px; display: flex; align-items: center;
    justify-content: space-between; height: 60px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }
  header .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 18px; color: #00843d; }
  header .brand span { font-size: 24px; }
  header nav { display: flex; gap: 8px; }
  header nav a { text-decoration: none; color: #555; font-size: 14px; padding: 6px 14px; border-radius: 6px; transition: background .15s; }
  header nav a:hover { background: #f0faf3; color: #00843d; }
  header .logout-btn {
    background: none; border: 1.5px solid #dc3545; color: #dc3545;
    padding: 6px 16px; border-radius: 6px; font-size: 14px;
    cursor: pointer; transition: .2s;
  }
  header .logout-btn:hover { background: #dc3545; color: #fff; }

  main { max-width: 900px; margin: 40px auto; padding: 0 24px; }

  .page-title { font-size: 26px; font-weight: 700; color: #1a1a2e; margin-bottom: 6px; }
  .page-sub { color: #888; font-size: 14px; margin-bottom: 28px; }

  .card {
    background: #fff; border-radius: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07); overflow: hidden;
  }
  .card-header {
    padding: 18px 24px; border-bottom: 1px solid #f0f0f0;
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-header h3 { font-size: 16px; font-weight: 700; color: #1a1a2e; }
  .card-header .count { background: #e8f7ee; color: #00843d; font-size: 12px; font-weight: 700; padding: 2px 10px; border-radius: 12px; }

  .add-btn {
    background: #00ba37; color: #fff; border: none;
    padding: 9px 20px; border-radius: 8px; font-size: 14px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background .2s;
  }
  .add-btn:hover { background: #00a332; }

  table { width: 100%; border-collapse: collapse; }
  thead tr { background: #fafafa; }
  th { padding: 12px 20px; text-align: left; font-size: 12px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid #f0f0f0; }
  td { padding: 14px 20px; border-bottom: 1px solid #f5f5f5; font-size: 15px; color: #333; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafff9; }

  .status-badge {
    display: inline-block; padding: 4px 12px; background: #e8f7ee;
    color: #00843d; border: 1.5px solid #00ba37; border-radius: 12px;
    font-size: 12px; font-weight: 600;
  }

  .action-btn {
    border: none; padding: 6px 14px; border-radius: 6px;
    font-size: 13px; font-weight: 600; cursor: pointer; transition: .15s;
  }
  .edit-btn { background: #fff3cd; color: #856404; margin-right: 6px; }
  .edit-btn:hover { background: #ffc107; color: #fff; }
  .del-btn { background: #fde8e8; color: #dc3545; }
  .del-btn:hover { background: #dc3545; color: #fff; }

  .empty-state { padding: 48px; text-align: center; color: #aaa; font-size: 15px; }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.4); z-index: 1000;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff; border-radius: 16px; padding: 36px;
    width: 460px; box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  }
  .modal h3 { font-size: 20px; font-weight: 700; margin-bottom: 20px; color: #1a1a2e; }
  .modal label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
  .modal input {
    width: 100%; padding: 11px 14px; border: 1.5px solid #ddd;
    border-radius: 8px; font-size: 15px; outline: none;
    transition: border-color .2s; margin-bottom: 20px;
  }
  .modal input:focus { border-color: #00ba37; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
  .cancel-btn {
    background: none; border: 1.5px solid #ddd; color: #555;
    padding: 10px 22px; border-radius: 8px; font-size: 14px; cursor: pointer;
  }
  .cancel-btn:hover { border-color: #aaa; }
  .save-btn {
    background: #00ba37; color: #fff; border: none;
    padding: 10px 24px; border-radius: 8px; font-size: 14px;
    font-weight: 600; cursor: pointer; transition: background .2s;
  }
  .save-btn:hover { background: #00a332; }

  .toast {
    position: fixed; bottom: 28px; right: 28px;
    background: #1a1a2e; color: #fff; padding: 12px 22px;
    border-radius: 10px; font-size: 14px; font-weight: 500;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2); opacity: 0;
    transform: translateY(10px); transition: .3s; pointer-events: none; z-index: 9999;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="logo">🎓</div>
    <h2>КАЗУИТС</h2>
    <p>Панель управления студентами</p>
    <input type="password" id="pwd-input" placeholder="Пароль" autocomplete="current-password">
    <button onclick="doLogin()">Войти</button>
    <div class="login-error" id="login-error">Неверный пароль</div>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-panel">
  <header>
    <div class="brand"><span>🎓</span> КАЗУИТС — Админ</div>
    <nav>
      <a href="index.html" target="_blank">Открыть сайт</a>
    </nav>
    <button class="logout-btn" onclick="doLogout()">Выйти</button>
  </header>

  <main>
    <div class="page-title">Студенты</div>
    <div class="page-sub">Управление списком студентов, отображаемых на публичной странице</div>

    <div class="card">
      <div class="card-header">
        <div style="display:flex;align-items:center;gap:10px;">
          <h3>Список студентов</h3>
          <span class="count" id="student-count">0</span>
        </div>
        <button class="add-btn" onclick="openModal()">+ Добавить студента</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>№</th>
            <th>ФИО студента</th>
            <th>Статус</th>
            <th>Действия</th>
          </tr>
        </thead>
        <tbody id="admin-tbody"></tbody>
      </table>
      <div class="empty-state" id="empty-state" style="display:none;">
        <div class="icon">👤</div>
        Список студентов пуст. Добавьте первого студента.
      </div>
    </div>
  </main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title">Добавить студента</h3>
    <label>ФИО студента</label>
    <input type="text" id="modal-name" placeholder="Фамилия Имя Отчество" autocomplete="off">
    <div class="modal-actions">
      <button class="cancel-btn" onclick="closeModal()">Отмена</button>
      <button class="save-btn" onclick="saveStudent()">Сохранить</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var PASS = "kazuits2024";
var editingId = null;

function doLogin() {
  var val = document.getElementById("pwd-input").value;
  if (val === PASS) {
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("admin-panel").style.display = "block";
    renderTable();
  } else {
    document.getElementById("login-error").style.display = "block";
  }
}

document.getElementById("pwd-input").addEventListener("keydown", function(e) {
  if (e.key === "Enter") doLogin();
});

function doLogout() {
  document.getElementById("admin-panel").style.display = "none";
  document.getElementById("login-screen").style.display = "flex";
  document.getElementById("pwd-input").value = "";
}

// Storage
var DEFAULT_STUDENTS = [{ id: 1, name: "Гасанли Айхан Насими оглу" }];

function getStudents() {
  try {
    var s = localStorage.getItem("kazuit_students");
    if (s !== null) return JSON.parse(s);
  } catch(e) {}
  // First visit — seed localStorage with defaults
  localStorage.setItem("kazuit_students", JSON.stringify(DEFAULT_STUDENTS));
  return DEFAULT_STUDENTS;
}

function setStudents(list) {
  try {
    localStorage.setItem("kazuit_students", JSON.stringify(list));
  } catch(e) {
    showToast("⚠️ Ошибка сохранения");
  }
}

// Render
function renderTable() {
  var students = getStudents();
  var tbody = document.getElementById("admin-tbody");
  var empty = document.getElementById("empty-state");
  document.getElementById("student-count").textContent = students.length;

  if (students.length === 0) {
    tbody.innerHTML = "";
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";

  tbody.innerHTML = students.map(function(s, i) {
    return '<tr>' +
      '<td style="color:#888;font-weight:500;">' + (i+1) + '</td>' +
      '<td style="font-weight:600;">' + escHtml(s.name) + '</td>' +
      '<td><span class="status-badge">✅ Студент</span></td>' +
      '<td>' +
        '<button class="action-btn edit-btn" onclick="openModal(' + s.id + ')">✏️ Изменить</button>' +
        '<button class="action-btn del-btn" onclick="deleteStudent(' + s.id + ')">🗑 Удалить</button>' +
      '</td>' +
    '</tr>';
  }).join('');
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Modal
function openModal(id) {
  editingId = id || null;
  var title = document.getElementById("modal-title");
  var input = document.getElementById("modal-name");
  if (id) {
    title.textContent = "Изменить студента";
    var s = getStudents().find(function(x){ return x.id === id; });
    input.value = s ? s.name : "";
  } else {
    title.textContent = "Добавить студента";
    input.value = "";
  }
  document.getElementById("modal-overlay").classList.add("open");
  setTimeout(function(){ input.focus(); }, 50);
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
  editingId = null;
}

function saveStudent() {
  var name = document.getElementById("modal-name").value.trim();
  if (!name) { document.getElementById("modal-name").focus(); return; }

  var students = getStudents();
  if (editingId) {
    students = students.map(function(s) {
      return s.id === editingId ? { id: s.id, name: name } : s;
    });
    showToast("Изменения сохранены");
  } else {
    var newId = students.length > 0 ? Math.max.apply(null, students.map(function(s){ return s.id; })) + 1 : 1;
    students.push({ id: newId, name: name });
    showToast("Студент добавлен");
  }

  setStudents(students);
  renderTable();
  closeModal();
}

function deleteStudent(id) {
  if (!confirm("Удалить студента из списка?")) return;
  var students = getStudents().filter(function(s){ return s.id !== id; });
  setStudents(students);
  renderTable();
  showToast("Студент удалён");
}

// Close modal on overlay click
document.getElementById("modal-overlay").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});

document.getElementById("modal-name").addEventListener("keydown", function(e) {
  if (e.key === "Enter") saveStudent();
});

// Toast
function showToast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(function(){ t.classList.remove("show"); }, 2500);
}
</script>
</body>
</html>
